/* ═══ TIMER HOOK ═══ */
function useTimer(totalMin){
  const [left,setLeft]=useState(totalMin*60);
  const [running,setRunning]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&left>0){ref.current=setInterval(()=>setLeft(l=>l<=1?(clearInterval(ref.current),0):l-1),1000);}
    return()=>clearInterval(ref.current);
  },[running]);
  const start=()=>setRunning(true);
  const pause=()=>{setRunning(false);clearInterval(ref.current);};
  const reset=()=>{pause();setLeft(totalMin*60);};
  const mm=String(Math.floor(left/60)).padStart(2,"0");
  const ss=String(left%60).padStart(2,"0");
  const pct=left/(totalMin*60);
  const urgent=left<600;
  return {left,running,start,pause,reset,mm,ss,pct,urgent};
}
