function useTTS(){
  const[isSpeaking,setS]=useState(false);const[isPaused,setP]=useState(false);
  useEffect(()=>{const s=window.speechSynthesis;const l=()=>s.getVoices();l();s.addEventListener("voiceschanged",l);return()=>{s.removeEventListener("voiceschanged",l);s.cancel()}},[]);
  const speak=useCallback(t=>{const s=window.speechSynthesis;s.cancel();const u=new SpeechSynthesisUtterance(t);const v=s.getVoices();const vo=v.find(x=>x.lang==="de-DE"&&x.name.includes("Google"))||v.find(x=>x.lang==="de-DE")||v.find(x=>x.lang.startsWith("de"))||v[0];if(vo)u.voice=vo;u.lang="de-DE";u.rate=0.92;u.pitch=1.05;u.onstart=()=>{setS(true);setP(false)};u.onend=()=>{setS(false);setP(false)};u.onerror=()=>{setS(false);setP(false)};s.speak(u)},[]);
  const pause=useCallback(()=>{window.speechSynthesis.pause();setP(true)},[]);
  const resume=useCallback(()=>{window.speechSynthesis.resume();setP(false)},[]);
  const stop=useCallback(()=>{window.speechSynthesis.cancel();setS(false);setP(false)},[]);
  return{speak,pause,resume,stop,isSpeaking,isPaused};
}

async function getAIFeedback(q,answer){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:"Du bist MARKI, ein freundlicher Lern-Assistent. Bewerte auf Deutsch. Gib Punkte (0-"+(q.points||4)+"), nenne was gut war und was fehlt. Max 4 Sätze.\n\nAufgabe: "+q.prompt+"\nMusterlösung: "+q.solution+"\nAntwort: "+answer+"\n\nBewertung:"}]})});
    const data=await res.json();return data.content?.map(b=>b.text||"").join("")||"Bewertung nicht verfügbar.";
  }catch{return "AI-Feedback nicht verfügbar. Vergleiche mit der Musterlösung.";}
}
